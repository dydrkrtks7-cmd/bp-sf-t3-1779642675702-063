<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d2137"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00bcd4"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Geometric pattern -->
  <circle cx="876" cy="161" r="54" fill="#0a1628" opacity="0.06"/>
    <circle cx="550" cy="347" r="49" fill="#0a1628" opacity="0.05"/>
    <circle cx="1151" cy="231" r="21" fill="#0a1628" opacity="0.20"/>
    <circle cx="987" cy="358" r="71" fill="#0a1628" opacity="0.16"/>
    <circle cx="977" cy="604" r="42" fill="#0a1628" opacity="0.05"/>
    <circle cx="430" cy="541" r="55" fill="#0a1628" opacity="0.11"/>
    <rect x="512" y="-78" width="94" height="56" rx="8" fill="#0d2137" opacity="0.08" transform="rotate(13, 447, 714)"/>
    <rect x="230" y="50" width="58" height="78" rx="8" fill="#0d2137" opacity="0.03" transform="rotate(16, 439, 304)"/>
    <rect x="459" y="392" width="40" height="24" rx="8" fill="#0d2137" opacity="0.09" transform="rotate(13, 13, 118)"/>
    <rect x="335" y="-24" width="82" height="48" rx="8" fill="#0d2137" opacity="0.14" transform="rotate(43, 339, 666)"/>
    <rect x="882" y="-93" width="70" height="86" rx="8" fill="#0d2137" opacity="0.13" transform="rotate(38, 332, -70)"/>
    <rect x="948" y="16" width="82" height="63" rx="8" fill="#0d2137" opacity="0.10" transform="rotate(39, -8, 194)"/>
    <rect x="526" y="327" width="80" height="90" rx="8" fill="#0d2137" opacity="0.10" transform="rotate(8, 371, -36)"/>
    <rect x="1261" y="717" width="58" height="29" rx="8" fill="#0d2137" opacity="0.05" transform="rotate(39, 1029, 722)"/>
    <polygon points="193,451 228,521 158,521" fill="#0a1628" opacity="0.11"/>
    <polygon points="413,102 465,206 361,206" fill="#0a1628" opacity="0.08"/>
    <polygon points="471,-88 520,10 422,10" fill="#0a1628" opacity="0.12"/>
    <polygon points="-37,-122 14,-20 -88,-20" fill="#0a1628" opacity="0.09"/>

  <!-- Wave at bottom -->
  <path d="M0,574 C360,602 840,546 1200,574 L1200,630 L0,630Z" fill="#0a1628" opacity="0.3"/>

  <!-- 중앙 텍스트 카드 -->
  <rect x="80" y="195" width="1040" height="260" rx="20" fill="rgba(0,0,0,0.35)" filter="url(#blur-bg)"/>
  <filter id="blur-bg"><feGaussianBlur stdDeviation="8"/></filter>

  <text x="600" y="270" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="2">
    SEO 오토파일럿 가격
  </text>
  <text x="600" y="330" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.85)">
    마포 — 서버 웜업
  </text>

  <!-- Accent line -->
  <line x1="450" y1="355" x2="750" y2="355" stroke="#00bcd4" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- 하단 CTA -->
  <rect x="440" y="385" width="320" height="40" rx="20" fill="#00bcd4" opacity="0.9"/>
  <text x="600" y="411" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="16" font-weight="600" fill="#ffffff">
    ▼ 자세히 보기
  </text>

  <!-- 상단 브랜드 -->
  <text x="60" y="55" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.6)">
    마포 SEO 오토파일럿 가격 — 서버 웜업
  </text>
</svg>